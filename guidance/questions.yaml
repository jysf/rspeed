# guidance/questions.yaml
# Open questions under active investigation. Agents can see what we're
# still figuring out and avoid re-deriving answers in isolation.
#
# Every question MUST have:
#   - id: stable kebab-case identifier
#   - question: the question in one sentence
#   - priority: critical | high | medium | low
#   - status: open | investigating | answered
#   - raised_by: human | claude | <agent-id>
#   - raised_at: YYYY-MM-DD
#   - assigned_to: null | <agent-id> | <human>
#
# When a question is answered, either:
#   (a) update status to "answered" and link to the DEC-XXX that records the answer, or
#   (b) delete the question if it was resolved without a formal decision.

questions:
  - id: dec-007-cargo-dist-freshness
    question: "Verify cargo-dist is still maintained and suitable for our matrix, or commit to the hand-rolled fallback, before SPEC-027 leaves Frame."
    priority: medium
    status: open
    raised_by: claude-opus-4-7
    raised_at: 2026-04-25
    assigned_to: null
    blocks: SPEC-027
    notes: |
      DEC-007's confidence is 0.70, right at the AGENTS.md §17
      threshold. The DEC body explicitly anticipates re-evaluation at
      STAGE-005 time. STAGE-005 is ~10 working days away; cargo-dist
      may have changed by then. Concrete check: is the project still
      shipping releases? Does its current GitHub Actions workflow
      template still align with our matrix (macOS arm64 + x86_64,
      Linux x86_64, Windows x86_64)? If "no" to either, fall back to
      a hand-rolled matrix workflow per the DEC's own escape hatch.

  - id: rust-toolchain-components-checklist
    question: "Should the spec template or AGENTS.md include a 'rust-toolchain.toml must declare components = [\"rustfmt\", \"clippy\"]' check for any spec that lands or modifies the toolchain pin?"
    priority: low
    status: open
    raised_by: claude-sonnet-4-6
    raised_at: 2026-04-26
    assigned_to: null
    notes: |
      SPEC-002 set rust-toolchain.toml without components; SPEC-003's CI
      exposed the gap (first run failed with "rustfmt/clippy not found"
      because rustup auto-installed the toolchain channel without
      components). Adding components is one-line and trivial. Worth a
      one-line checklist item in either the spec template's standard
      acceptance criteria or AGENTS.md's rspeed-specific section. Defer
      until the next toolchain-touching spec or a template revision pass.

  - id: actions-node24-migration
    question: "When should we bump GitHub Actions to Node.js 24-compatible versions (actions/checkout@v5 etc.) before the June 2026 deprecation?"
    priority: low
    status: open
    raised_by: claude-sonnet-4-6
    raised_at: 2026-04-26
    assigned_to: null
    notes: |
      CI annotations on every run flag actions/checkout@v4 as Node 20.
      Default switches to Node 24 on June 2, 2026. Plenty of runway.
      Check whether actions/checkout@v5 is GA, and whether
      Swatinem/rust-cache has a Node 24 release before bumping.

  - id: throughput-warmup-duration
    question: "Is 2 seconds the right throughput warm-up window, or should it be auto-detected from CWND saturation?"
    priority: low
    status: open
    raised_by: claude-opus-4-7
    raised_at: 2026-04-25
    assigned_to: null
    blocks: SPEC-007
    notes: |
      DEC-006 commits to a fixed 2s warm-up window. STAGE-002's
      MetricsAccumulator implements this. STAGE-004 perf work may
      reveal that 2s is too long (wastes test time on fast links) or
      too short (slow-start incomplete on high-RTT links). A more
      sophisticated approach detects CWND saturation by watching
      throughput stabilize before recording. Defer until we have
      measurements.
