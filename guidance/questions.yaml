  - id: cost-tracking-tooling-debt
    question: "Should we build a `just record-cost` helper (or a Stop hook) to backfill `tokens_total` / `estimated_usd` into cost.sessions entries after Claude Code sessions end?"
    priority: medium
    status: answered
    raised_by: claude-sonnet-4-6
    raised_at: 2026-04-27
    answered_at: 2026-04-27
    assigned_to: null
    blocks: null
    notes: |
      Answered via Option A: `just record-cost SPEC-NNN cycle [--tokens-input N]
      [--tokens-output N] [--usd N.NN] [--note "text"]` helper landed in
      `scripts/record-cost.py` (Python stdlib only; no external deps).
      The helper finds the most recent matching-cycle entry with null token
      fields, converts legacy `tokens_total: null` shorthand to canonical
      `tokens_input` + `tokens_output` (matching what `scripts/_lib.sh` reads
      for aggregation), recomputes `cost.totals`. Verified end-to-end:
      `_lib.sh` parser reads exactly what `record-cost.py` writes.
      AGENTS.md §4 updated to document the helper as the standard backfill
      flow. Option B (Stop hook) deferred — would be invisible but adds
      complexity for marginal benefit; revisit if manual backfill friction
      becomes a real problem.

      Option B (autopilot) is now also delivered via `scripts/session-cost.py`
      (`just session-cost SPEC-NNN cycle --apply`). The helper reads the most
      recent Claude Code transcript JSONL, sums per-model token types (regular
      input, cache reads, cache writes 5m/1h, output) using model-aware pricing,
      and invokes record-cost automatically — no /cost copy/paste required.
      The manual `record-cost` path remains as a fallback for non-Claude-Code
      agents (API calls, Claude.ai web, third-party tools) where transcript
      parsing is not applicable. This fully resolves the copy/paste friction
      that motivated the original Option B deferral.

  - id: cloudflare-http2-stall-on-parallel-download
    question: "Does try_join_all + select_all stall on Cloudflare's HTTP/2 multiplexed connection when N download streams are awaited concurrently?"
    priority: high
    status: open
    raised_by: SPEC-010
    raised_at: 2026-05-02
    assigned_to: null
    deferred_to: STAGE-004
    deferral_rationale: "SPEC-013 scope is failure modes (timeout/reset/malformed), not perf-multiplexing investigation; SPEC-013 (STAGE-002) closes without resolving this question; STAGE-004 perf work owns it. The SPEC-013 download-deadline test provides a regression guard: if any download phase stalls indefinitely, CI fails."
    notes: |
      SPEC-010 Frame item (A). MockServer tests use HTTP/1.1 (separate
      connections per request) so the stall scenario is not exercised.
      Against Cloudflare's HTTP/2 endpoint, all N connections may be
      multiplexed onto a single TCP stream; if the server-side flow control
      window stalls, all N futures block together rather than making partial
      progress. SPEC-013's live-network tests are the first opportunity to
      observe this. If stalling is observed, options include: chunked
      try_join_all with a semaphore, dropping to HTTP/1.1 for download,
      or tuning the per-stream window size.

  - id: throughput-warmup-duration
    question: "Is 2 seconds the right throughput warm-up window, or should it be auto-detected from CWND saturation?"
    priority: low
    status: open
    raised_by: claude-opus-4-7
    raised_at: 2026-04-25
    assigned_to: null
    blocks: SPEC-007
    notes: |
      DEC-006 commits to a fixed 2s warm-up window. STAGE-002's
      MetricsAccumulator implements this. STAGE-004 perf work may
      reveal that 2s is too long (wastes test time on fast links) or
      too short (slow-start incomplete on high-RTT links). A more
      sophisticated approach detects CWND saturation by watching
      throughput stabilize before recording. Defer until we have
      measurements.

  - id: generic-backend-base-url-trailing-slash
    question: "Should --server URL require a trailing slash, or should we
      normalize? Url::join replaces the last path segment if no trailing
      slash, which silently breaks user-supplied base URLs with a path
      component (e.g. http://server/api/)."
    priority: medium
    status: answered
    raised_at: 2026-05-02
    raised_by: SPEC-011 design (inherited from SPEC-008)
    answered_at: 2026-05-03
    assigned_to: null
    blocks: null
    notes: |
      Resolved by SPEC-012 via Config::validate(): rejects --server URLs
      whose path() does not end with '/'. Pinned by
      config_validate_rejects_server_without_trailing_slash test. The
      "normalize silently" alternative was rejected because it would mask
      the user's typo (http://server/api vs http://server/api/) — better
      to fail loudly at CLI parse time than to silently strip a path
      segment from the user-supplied base.

